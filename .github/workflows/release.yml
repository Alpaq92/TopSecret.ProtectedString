name: Release

# release-please reads Conventional Commits on master (feat:, fix:, deps:,
# docs:, refactor:, BREAKING CHANGE) and maintains a "Release PR" that bumps
# .release-please-manifest.json and prepends the generated section to
# CHANGELOG.md. The PR is queued for auto-merge, so it lands on its own once
# the required checks are green. Merging it creates the tag + GitHub Release;
# the publish job then packs every NuGet at the new tag on macos-14 (the only
# runner with all Apple SDKs + android + wasm workloads for the six-TFM main
# library) and pushes to NuGet.org. First release from the 0.0.0 manifest
# with feat: commits lands as 0.1.0 (bump-minor-pre-major).
#
# Releases created by GITHUB_TOKEN don't trigger `on: release` workflows, so
# the Pages demo deploy is dispatched explicitly at the end of publish
# instead of relying on pages.yml's release trigger. Set a RELEASE_PLEASE_PAT
# secret to lift that limitation repo-wide.
#
# Analyzer release tracking: new rules stay in AnalyzerReleases.Unshipped.md
# (valid indefinitely for the build); promoting them to Shipped.md under a
# version heading is a deliberate maintainer commit, ideally folded into the
# release PR before it merges.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manually publish this existing tag (skips release-please)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open / merge release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      released: ${{ steps.rp.outputs.releases_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on release PR
        if: steps.rp.outputs.pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.rp.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge --auto --squash "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  publish:
    name: Pack & publish to NuGet + deploy demo
    runs-on: macos-14
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.released == 'true' || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: write # gh release upload
      actions: write  # gh workflow run pages.yml
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag || inputs.tag }}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5

      # macos-14 is the only hosted runner where all five installs succeed —
      # required for the main library's six-TFM pack.
      - name: Install workloads
        run: dotnet workload install android ios macos maccatalyst wasm-tools

      # The release body (generated by release-please from Conventional
      # Commits) becomes each package's <releaseNotes> on nuget.org:
      # Directory.Build.props reads release_notes.txt when it exists.
      - name: Extract release notes for nuget.org
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${{ steps.tag.outputs.name }}" --json body --jq .body > release_notes.txt || echo "Release ${{ steps.tag.outputs.name }}" > release_notes.txt

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build TopSecret.ProtectedString.sln --configuration Release --no-restore -p:Version=${{ steps.tag.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      # Sln-wide pack emits the five IsPackable projects: main, WindowsTpm,
      # LinuxTpm, Configuration, ProtectedBlob. The analyzer DLL ships inside
      # the main and ProtectedBlob packages at analyzers/dotnet/cs/.
      - name: Pack
        run: dotnet pack TopSecret.ProtectedString.sln --configuration Release --no-build -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      # List every entry inside each .nupkg so mis-packs (a TFM dropping out,
      # analyzer DLL missing, wrong icon/readme) are visible in the log.
      - name: Verify package contents
        shell: bash
        run: |
          set -euo pipefail
          found=0
          for pkg in ./nupkg/*.nupkg; do
            found=1
            echo "=== $pkg ==="
            unzip -l "$pkg"
          done
          if [ "$found" -eq 0 ]; then
            echo "No .nupkg files produced" >&2
            exit 1
          fi

      - name: Verify NuGet credentials
        shell: bash
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "NUGET_API_KEY secret is empty or unset — cannot push to NuGet.org." >&2
            echo "Add it under Settings → Secrets and variables → Actions, then re-run this workflow with the tag input." >&2
            exit 1
          fi

      # --skip-duplicate makes re-runs safe after a partial push; .snupkg
      # symbol packages are auto-detected and uploaded alongside.
      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Attach packages to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.name }}" ./nupkg/* --clobber

      # The live demo redeploys via pages.yml on every push to master, and
      # the release-please PR merge that produced this release was such a
      # push — so the demo is already up to date without an explicit
      # dispatch here.
