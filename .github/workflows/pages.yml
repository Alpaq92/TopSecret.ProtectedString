name: Deploy demo to GitHub Pages

# Publishes TopSecret.Demo.Wasm — the xterm.js-wrapped, fully client-side
# WebAssembly build of TopSecret.Demo — to GitHub Pages on every push to
# master, so the live demo always matches the tip of the default branch
# (every release lands on master via the release-please merge, so releases
# are covered too). workflow_dispatch allows out-of-band redeploys.
#
# A push trigger also ensures GitHub registers this workflow immediately;
# a dispatch/release/schedule-only workflow is not indexed until one of
# those events first fires, which would make `workflow_dispatch` unusable.
#
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish wasm demo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Honours global.json (SDK floor 10.0.200, rollForward latestFeature).
      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      # CI_TFMS restricts the main library to the TFMs this runner can build
      # (net10.0 + the browser build the wasm demo binds); otherwise restore
      # pulls net10.0-android/-ios/etc. and fails with NETSDK1147.
      - name: Publish TopSecret.Demo.Wasm
        env:
          CI_TFMS: net10.0;net10.0-browser
        run: dotnet publish TopSecret.Demo.Wasm/TopSecret.Demo.Wasm.csproj --configuration Release -o ./demo-publish

      # The WebAssembly SDK's publish output is the AppBundle folder
      # (index.html + main.js + _framework/). Locate it robustly rather
      # than hard-coding the intermediate layout, then disable Jekyll so
      # the underscore-prefixed _framework folder is served.
      - name: Stage Pages artifact
        run: |
          set -euo pipefail
          matches=$(find ./demo-publish -name index.html -printf '%h\n')
          count=$(printf '%s\n' "$matches" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly one index.html in publish output, found $count" >&2
            find ./demo-publish -maxdepth 3 -type d >&2
            exit 1
          fi
          bundle=$matches
          echo "AppBundle: $bundle"
          touch "$bundle/.nojekyll"
          echo "bundle=$bundle" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.bundle }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
