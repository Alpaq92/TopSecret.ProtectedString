<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopSecret.ProtectedString — live demo</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Version-pinned xterm.js + fit addon from jsDelivr; the rest of the
         page is the static output of `dotnet publish` and runs client-side. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --fg: #1b1b1f;
            --muted: #6b6b74;
            --border: #d9d9e0;
            --button-bg: #ffffff;
            --button-hover: #ececf1;
            --link: #2563ab;
        }
        :root[data-theme="dark"] {
            --bg: #101014;
            --fg: #d4d4d8;
            --muted: #8a8a93;
            --border: #26262c;
            --button-bg: #1e1e26;
            --button-hover: #26262f;
            --link: #7cb2e8;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }
        header {
            flex: 0 0 auto;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
        header a { color: var(--link); text-decoration: none; }
        header a:hover { text-decoration: underline; }
        header .note { font-size: 0.8rem; color: var(--muted); }
        header button, header select {
            background: var(--button-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        header button:hover:not(:disabled) { background: var(--button-hover); }
        header button:disabled { opacity: 0.45; cursor: default; }
        /* Align focus + form accents to the blue link colour (browser
           defaults render a contrasting gold/yellow ring otherwise). */
        header button:focus, header select:focus,
        header button:focus-visible, header select:focus-visible {
            outline: 2px solid var(--link);
            outline-offset: 1px;
        }
        header select {
            accent-color: var(--link);
            appearance: none;
            -webkit-appearance: none;
            text-align: left;
            min-width: 9rem;
            padding-right: 1.4rem;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%237cb2e8' stroke-width='1.5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
        }
        /* Terminal fills the remaining height; xterm's fit addon sizes the
           grid to this box. The .xterm element stretches to fill it. */
        #terminal {
            flex: 1 1 auto;
            min-height: 0;
            padding: 0.5rem 0.8rem;
            background: var(--bg);
        }
        #terminal .xterm { height: 100%; }
        /* xterm scrolls its own internal viewport div, whose scrollbar is
           unthemed by default — the browser renders it (track, thumb, and
           especially the corner where the vertical scrollbar meets the
           bottom edge) in its native light colours regardless of page
           theme, showing up as a stray white patch in dark mode. */
        #terminal .xterm-viewport {
            scrollbar-color: var(--border) var(--bg);
        }
        #terminal .xterm-viewport::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        #terminal .xterm-viewport::-webkit-scrollbar-track {
            background: var(--bg);
        }
        #terminal .xterm-viewport::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        #terminal .xterm-viewport::-webkit-scrollbar-corner {
            background: var(--bg);
        }
    </style>
    <script type="module" src="main.js"></script>
</head>

<body>
    <header>
        <h1>TopSecret.ProtectedString + ProtectedBlob — live demo</h1>
        <a href="https://github.com/Alpaq92/TopSecret.ProtectedString">GitHub</a>
        <a href="https://www.nuget.org/packages/TopSecret.ProtectedString">NuGet</a>
        <button id="rerun" disabled>Run again</button>
        <select id="theme" aria-label="Theme">
            <option value="system" selected>System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
        <span class="note">Runs entirely in your browser via .NET WebAssembly — no server, nothing leaves the page.</span>
    </header>
    <div id="terminal"></div>
</body>

</html>
