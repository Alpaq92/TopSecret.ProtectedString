# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
# The CodeRabbit GitHub App must be installed on this repository
# (https://github.com/apps/coderabbitai) for reviews to run; this file only
# configures its behavior once installed. Its PR reviews count toward the
# ruleset's required-approval gate ("maintainer OR CodeRabbit") because
# request_changes_workflow is true below — see that setting for why this is
# the only configuration where that sentence is actually true.

language: "en-US"

reviews:
  profile: "assertive"
  # true: CodeRabbit submits a REAL GitHub review — APPROVE when it finds
  # nothing actionable (satisfies required_approving_review_count: 1 on its
  # own, no human needed), CHANGES_REQUESTED when it does (blocks merge until
  # addressed or dismissed).
  #
  # Previously ran at false (comment-only: never approves, never blocks) so a
  # nitpick couldn't wedge a PR — but that silently broke the "OR CodeRabbit"
  # half of the gate, since a comment is not a GitHub approval. In practice
  # this repo's first PR (the 0.1.0 release PR) still got wedged anyway, on a
  # genuine CHANGES_REQUESTED review filed just before `false` took effect;
  # dismiss_stale_reviews_on_push didn't clear it because the fixing commits
  # landed on master directly rather than on the release PR's own branch, so
  # GitHub never saw a push to dismiss the stale review against — it needed a
  # manual dismissal. Net effect of `false`: all of the blocking risk, none of
  # the "OR CodeRabbit" benefit. Reverted to `true`, accepting that a real
  # CHANGES_REQUESTED can wedge a PR again. If a release-please PR gets stuck
  # the same way: comment `@coderabbitai review` to re-run against the
  # current diff, or dismiss the review manually — same recovery as before.
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true                  # review every PR automatically
    drafts: false
  path_instructions:
    - path: "TopSecret.ProtectedString/**/*.cs"
      instructions: |
        Security-critical code. Verify: every pinned/locked buffer is wiped via
        CryptographicOperations.ZeroMemory (through ProtectedString.ZeroBytes/ZeroChars)
        on ALL exit paths including exceptions; no plaintext escapes an Access
        callback; internal members consumed by sibling assemblies keep
        TFM-invariant signatures (#if in bodies only).
    - path: "TopSecret.ProtectedBlob/**/*.cs"
      instructions: |
        Security-critical code. The wire format (ChunkFormat.cs) is FROZEN —
        any byte-layout change is breaking and requires a new magic value and
        an update to WireFormatPinningTests, never a silent edit. Verify DEK
        scratch is wiped in finally on all paths and that reads fail closed
        (CryptographicException) on any tamper scenario.
    - path: "**/*Tests/**/*.cs"
      instructions: |
        Tamper-matrix and wire-format-pinning tests are contracts, not
        implementation mirrors — flag any weakening (removed cases, loosened
        assertions, Assert.Ignore added without a platform reason).
  path_filters:
    - "!**/bin/**"
    - "!**/obj/**"

chat:
  auto_reply: true
